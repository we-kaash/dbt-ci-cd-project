name: dbt CD

on:
  push:
    branches:
      - main

jobs:
  dbt-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dbt
        run: pip install dbt-core dbt-duckdb

      - name: Run dbt
        run: |
          dbt deps
          dbt seed
          dbt build